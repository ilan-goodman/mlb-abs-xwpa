name: Update ABS xWPA site

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.schedule_gate.outputs.should_run }}
    steps:
      - name: Check Central schedule window
        id: schedule_gate
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(TZ=America/Chicago date +%H)" != "06" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore MLB API cache
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/cache@v5
        with:
          path: data/raw
          key: mlb-raw-${{ github.run_id }}
          restore-keys: |
            mlb-raw-

      - name: Generate latest metrics and site
        if: steps.schedule_gate.outputs.should_run == 'true'
        env:
          ADSENSE_CLIENT: ${{ secrets.ADSENSE_CLIENT || vars.ADSENSE_CLIENT }}
          ADSENSE_SLOT: ${{ secrets.ADSENSE_SLOT || vars.ADSENSE_SLOT }}
        run: python3 scripts/update_abs_xwpa.py --year 2026 --model-scope season

      - name: Verify generated JavaScript
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: |
          python3 -m py_compile scripts/update_abs_xwpa.py
          python3 - <<'PY' | node --check -
          from pathlib import Path
          import re
          html = Path("site/index.html").read_text(encoding="utf-8")
          scripts = re.findall(r"<script>(.*?)</script>", html, re.S)
          if not scripts:
              raise SystemExit("No inline script found in site/index.html")
          print("\n;\n".join(scripts))
          PY

      - name: Commit refreshed outputs
        if: steps.schedule_gate.outputs.should_run == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        run: |
          if [ -z "$(git status --porcelain data/processed site)" ]; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed site
          git commit -m "Update ABS xWPA site data"
          git push

      - name: Configure GitHub Pages
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    if: needs.build.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
