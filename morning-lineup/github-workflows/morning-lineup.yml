name: Send Morning Lineup

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Check Pacific schedule window
        id: schedule_gate
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(TZ=America/Los_Angeles date +%H)" != "05" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Send baseball packets
        if: steps.schedule_gate.outputs.should_run == 'true'
        env:
          MORNING_LINEUP_SUBSCRIBERS_JSON: ${{ secrets.MORNING_LINEUP_SUBSCRIBERS_JSON }}
          MORNING_LINEUP_FROM_EMAIL: ${{ secrets.MORNING_LINEUP_FROM_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 -m morning_lineup.daily --send
